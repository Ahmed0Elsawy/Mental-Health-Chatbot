<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Count</title>
    <style>
        /* Basic reset for margin and padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            font-size: 2rem;
            color: #333;
            margin-bottom: 1rem;
            text-align: center;
        }

        ul {
            list-style-type: none;
            padding: 0;
            width: 100%;
            max-width: 400px;
        }

        ul li, ul::before {
            background-color: #fff;
            padding: 1rem;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 1rem;
            font-size: 1.1rem;
            color: #555;
        }

        /* Style for the first item in the list ("Number of registered users") */
        ul::before {
            content: "Number of registered users: {{ count }}";
            font-weight: bold;
            color: #333;
            display: block;
        }
    </style>
</head>
<body>
    <h1>Counts of User Concerns</h1>
    <ul>
        {% for concern, count in counts.items() %}
            <li>{{ concern }}: {{ count }}</li>
        {% endfor %}
    </ul>
</body>
</html>
